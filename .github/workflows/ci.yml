name: CI/CD — Yvris Business Cloud

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-syntax:
    name: PHP Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Check PHP syntax (all files)
        run: find . -name "*.php" -not -path "./vendor/*" | xargs -I{} php -l {}

  security-check:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: lint-and-syntax
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Check for hardcoded secrets
        run: |
          if grep -rn "password\s*=\s*['\"][^'\"]\+['\"]" --include="*.php" config/ app/; then
            echo "WARNING: Possible hardcoded credentials found"
          fi

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [lint-and-syntax, security-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH (optional — configure secrets)
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_KEY:  ${{ secrets.SSH_PRIVATE_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          if [ -n "$SSH_HOST" ]; then
            mkdir -p ~/.ssh
            echo "$SSH_KEY" > ~/.ssh/deploy_key
            chmod 600 ~/.ssh/deploy_key
            rsync -avz --exclude '.git' --exclude 'node_modules' \
              -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
              ./ "$SSH_USER@$SSH_HOST:$DEPLOY_PATH"
          else
            echo "SSH secrets not configured — skipping deploy"
          fi

      - name: Notify success
        if: success()
        run: echo "Deployment completed successfully at $(date)"
